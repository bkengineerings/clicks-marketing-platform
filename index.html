<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clicks Marketing | Brand Platform</title>
    <!-- De CSS wordt automatisch door Vite geladen via main.js -->
  </head>
  <body class="bg-zinc-950 text-white selection:bg-yellow-400 selection:text-black overflow-x-hidden">
    
    <div id="app">
      <!-- Navigatie -->
      <nav class="fixed w-full z-50 bg-zinc-950/90 backdrop-blur-md border-b border-white/10 px-6 py-5">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
          <div class="text-3xl font-black tracking-tighter">CLICKS.</div>
          <div class="hidden md:flex space-x-12 text-[10px] uppercase tracking-[0.4em] font-bold text-zinc-500">
            <span>Home</span>
            <span>Diensten</span>
            <span>Nieuw Concept</span>
          </div>
          <div id="lang-display" class="bg-zinc-900 border border-white/10 rounded-full px-4 py-1 text-[10px] font-black">
            NL
          </div>
        </div>
      </nav>

      <!-- Hero met de Ransom Title -->
      <header class="pt-56 pb-24 px-4 text-center">
        <div id="ransom-title" class="flex flex-col items-center gap-8 text-5xl md:text-8xl lg:text-9xl">
          <!-- JS vult dit in -->
        </div>
      </header>

      <!-- De Oneindige Slider -->
      <div class="slider-wrapper py-20 border-y border-white/5 relative">
        <div id="infinite-track" class="flex w-max animate-scroll">
          <!-- JS vult dit in -->
        </div>
      </div>

      <!-- Bento Grid Sectie -->
      <section class="max-w-7xl mx-auto px-6 py-40">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 auto-rows-[300px]">
          <div class="md:col-span-2 md:row-span-2 bg-zinc-900 rounded-[3rem] p-12 flex flex-col justify-end border border-white/5">
            <h3 class="text-5xl font-black tracking-tighter">VIDEO FIRST.</h3>
          </div>
          <div class="bg-white text-black rounded-[3rem] p-10 flex flex-col justify-between">
            <div class="text-4xl font-black leading-none">NO<br>TEMPLATES.</div>
          </div>
          <div class="bg-zinc-800 rounded-[3rem] p-10 flex flex-col items-center justify-center border border-white/10">
            <div class="w-4 h-4 bg-red-500 rounded-full animate-ping"></div>
          </div>
          <div class="bg-indigo-600 rounded-[3rem] p-10 flex flex-col justify-end text-3xl font-black italic">
            SYNC.
          </div>
          <div class="bg-zinc-900 rounded-[3rem] p-10 border border-white/5 flex items-center justify-center text-6xl font-black opacity-10">
            0.4s
          </div>
        </div>
      </section>

      <footer class="py-20 text-center border-t border-white/5">
        <p class="font-mono text-[10px] text-zinc-700 uppercase tracking-[1em]">Clicks Marketing // 2026</p>
      </footer>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
